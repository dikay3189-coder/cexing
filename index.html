// Duration helpers: duration stored as integer minutes (backward compat with old "0.5h"/"1h"/"half"/"full" strings)
function durMinutes(d){
  if(!d)return 0;
  if(typeof d==='number')return d;
  if(d==='full')return 480; // 8h
  if(d==='half')return 240; // 4h
  var m=/^([\d.]+)h$/.exec(d);
  if(m)return Math.round(parseFloat(m[1])*60);
  var mm=/^(\d+)m?$/.exec(d);
  if(mm)return parseInt(mm[1],10);
  return 0;
}
function durHours(d){return durMinutes(d)/60;}
function sumDur(cards){
  var m=0;cards.forEach(function(c){m+=durMinutes(c.duration);});
  return m/60;
}
function fmtDurMin(min){
  if(!min)return '';
  if(min<60)return min+'分';
  var h=Math.floor(min/60),m=min%60;
  if(m===0)return h+'h';
  return h+'h'+m+'分';
}
function fmtDur(h){
  if(!h)return '';
  return fmtDurMin(Math.round(h*60));
}

const LS='cexing_v1';
function ldLS(){try{var r=localStorage.getItem(LS);return r?JSON.parse(r):null;}catch(e){console.warn('ldLS failed',e);return null;}}
function svLS(d){
  try{localStorage.setItem(LS,JSON.stringify(d));return true;}
  catch(e){
    console.warn('svLS failed — likely quota exceeded',e);
    // If quota exceeded, try saving without image data as fallback
    if(e&&(e.name==='QuotaExceededError'||e.code===22)){
      try{
        var slim={trips:d.trips,tripData:{}};
        Object.keys(d.tripData||{}).forEach(function(tid){
          var td=d.tripData[tid];
          slim.tripData[tid]={
            plans:td.plans,
            cards:(td.cards||[]).map(function(c){return Object.assign({},c,{imgs:[]});})
          };
        });
        localStorage.setItem(LS,JSON.stringify(slim));
        if(typeof window!=='undefined'&&window.__cexingSaveWarned!==true){
          window.__cexingSaveWarned=true;
          setTimeout(function(){alert('存储空间不足，图片已临时从本地缓存移除。请减少图片数量。');},100);
        }
      }catch(_){}
    }
    return false;
  }
}

function enc(trip,plans,cards){
  try{
    // Short field names + deflate compression → ~1/3 the size
    // Map cat keys to single chars: f=food s=stay p=spot F=fun h=shop o=other
    var cm={food:'f',stay:'s',spot:'p',fun:'F',shop:'h',other:'o'};
    var t=[trip.name,trip.date||'',trip.days,trip.color||'#8BB08E'];
    var c=cards.map(function(x){return [x.id,x.name,cm[x.cat]||'o',x.hours||'',x.note||''];});
    // Plans: only store non-empty slots. Format: [[dayIdx,slotIdx,cardId],...]
    var p=[];
    Object.keys(plans).forEach(function(d,di){
      ['morning','afternoon','evening'].forEach(function(s,si){
        (plans[d][s]||[]).forEach(function(card){p.push([di,si,card.id]);});
      });
    });
    var obj={v:2,t:t,c:c,p:p};
    var json=JSON.stringify(obj);
    // Deflate compress
    if(window.pako){
      var compressed=pako.deflate(json);
      var b64=btoa(String.fromCharCode.apply(null,compressed));
      return 'Z'+b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    }else{
      var b64=btoa(encodeURIComponent(json).replace(/%([0-9A-F]{2})/g,function(_,p){return String.fromCharCode('0x'+p);}));
      return 'U'+b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    }
  }catch(e){return null;}
}
function dec(code){
  try{
    code=code.trim();
    // Legacy v1 format (no prefix): base64 of {v:1,trip,plans,cards}
    if(!/^[ZU]/.test(code)){
      var b64=code.replace(/-/g,'+').replace(/_/g,'/');while(b64.length%4)b64+='=';
      var json=decodeURIComponent(Array.prototype.map.call(atob(b64),function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join(''));
      var obj=JSON.parse(json);if(!obj.v||!obj.trip)return null;return obj;
    }
    var prefix=code[0],rest=code.slice(1);
    var b64=rest.replace(/-/g,'+').replace(/_/g,'/');while(b64.length%4)b64+='=';
    var json;
    if(prefix==='Z'&&window.pako){
      var bin=atob(b64);var arr=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
      json=pako.inflate(arr,{to:'string'});
    }else{
      json=decodeURIComponent(Array.prototype.map.call(atob(b64),function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join(''));
    }
    var obj=JSON.parse(json);
    if(obj.v!==2)return null;
    // Expand short form back to full
    var cmr={f:'food',s:'stay',p:'spot',F:'fun',h:'shop',o:'other'};
    var trip={id:'t'+Date.now()+'_'+Math.random().toString(36).slice(2,7),name:obj.t[0],date:obj.t[1],days:obj.t[2],color:obj.t[3],members:1,createdAt:Date.now()};
    var cards=obj.c.map(function(a){return {id:a[0],name:a[1],cat:cmr[a[2]]||'other',hours:a[3],note:a[4],imgs:[]};});
    var cardById={};cards.forEach(function(x){cardById[x.id]=x;});
    var plans={};var daysArr=[];for(var i=1;i<=trip.days;i++){daysArr.push('Day '+i);plans['Day '+i]={morning:[],afternoon:[],evening:[]};}
    var slotNames=['morning','afternoon','evening'];
    obj.p.forEach(function(a){
      var d=daysArr[a[0]],s=slotNames[a[1]],cid=a[2];
      if(d&&s&&cardById[cid])plans[d][s].push(cardById[cid]);
    });
    return {v:2,trip:trip,plans:plans,cards:cards};
  }catch(e){return null;}
}

// Duration picker with presets + custom H:M input
function DurPicker({value,onChange}){
  // value is always stored as minutes (integer) or empty string
  var curMin=durMinutes(value);
  var presets=[{m:0,l:'不设置'},{m:30,l:'30分'},{m:60,l:'1h'},{m:120,l:'2h'},{m:180,l:'3h'},{m:240,l:'半天'},{m:480,l:'全天'}];
  var isPreset=presets.some(function(p){return p.m===curMin;});

function Slot({day,sid,cards,isOver,onExtOver,onExtLeave,onExtDrop,onTap,onRm,onReorder,onMoveToSlot,dragState,setDragState,onSwitchDay}){
  var m=SLOTS[sid];

  var hovIdx=dragState.hovSlot===sid&&dragState.hovDay===day?dragState.hovIdx:null;
  var slotHovered=dragState.hovSlot===sid&&dragState.hovDay===day;

  // Drag is triggered by the grip handle only, not the whole card
  // cardEl parameter is the actual card container (for rect/visibility), handle is where the pointer started
  function pointerDown(e,idx,card,cardEl){
    if(e.pointerType==='mouse'&&e.button!==0)return;
    e.stopPropagation();
    var startX=e.clientX,startY=e.clientY;
    var rect=cardEl.getBoundingClientRect();
    var offsetX=startX-rect.left;
    var offsetY=startY-rect.top;
    var started=false;
    var dayNavHoverEl=null,dayNavTimer=null;

    function clearDayNavTimer(){
      if(dayNavTimer){clearTimeout(dayNavTimer);dayNavTimer=null;}
      if(dayNavHoverEl){dayNavHoverEl.style.boxShadow='';dayNavHoverEl.style.transform='';dayNavHoverEl=null;}
    }

    function startDrag(cx,cy){
      started=true;
      if(navigator.vibrate)try{navigator.vibrate(20);}catch(_){}
      document.body.style.overflow='hidden';
      document.body.style.touchAction='none';
      setDragState({
        dragging:true,card:card,
        srcDay:day,srcSlot:sid,srcIdx:idx,
        hovSlot:sid,hovDay:day,hovIdx:null,
        ghost:{x:cx-offsetX,y:cy-offsetY,w:rect.width}
      });
    }

    function move(ev){
      var cx=ev.clientX,cy=ev.clientY;
      var dx=cx-startX,dy=cy-startY;
      if(!started){
        // Trigger on first move of >3px (grip area is drag-only, no ambiguity)
        if(Math.abs(dx)<3&&Math.abs(dy)<3)return;
        startDrag(cx,cy);
      }
      setDragState(function(p){return p.dragging?{...p,ghost:{x:cx-offsetX,y:cy-offsetY,w:rect.width}}:p;});

      var vh=window.innerHeight;
      if(cy<80)window.scrollBy(0,-8);
      else if(cy>vh-80)window.scrollBy(0,8);

      var target=document.elementFromPoint(cx,cy);
      var dayBtn=target&&target.closest&&target.closest('[data-daynav]');
      if(dayBtn){
        var targetDay=dayBtn.dataset.daynav;
        if(targetDay!==day&&dayBtn!==dayNavHoverEl){
          clearDayNavTimer();
          dayNavHoverEl=dayBtn;
          dayBtn.style.boxShadow='0 0 0 2px '+C.sageD+',0 4px 16px rgba(78,115,82,.3)';
          dayBtn.style.transform='scale(1.08)';
          dayBtn.style.transition='all .2s';
          dayNavTimer=setTimeout(function(){
            onMoveToSlot(day,sid,idx,targetDay,sid,999);
            if(onSwitchDay)onSwitchDay(targetDay);
            if(navigator.vibrate)try{navigator.vibrate(30);}catch(_){}
            setDragState({dragging:false,card:null,srcDay:null,srcSlot:null,srcIdx:null,hovSlot:null,hovDay:null,hovIdx:null,ghost:null});
            document.removeEventListener('pointermove',move);
            document.removeEventListener('pointerup',up);
            document.removeEventListener('pointercancel',up);
            document.body.style.overflow='';
            document.body.style.touchAction='';
            clearDayNavTimer();
            started=false;
          },500);
        }
        setDragState(function(p){return p.dragging?{...p,hovSlot:null,hovDay:null,hovIdx:null}:p;});
        return;
      }else{
        if(dayNavHoverEl)clearDayNavTimer();
      }

      var slotEl=target&&target.closest&&target.closest('[data-slot]');
      if(!slotEl){ setDragState(function(p){return p.dragging?{...p,hovSlot:null,hovDay:null,hovIdx:null}:p;}); return; }
      var slotInfo=slotEl.dataset.slot.split('|');
      var tDay=slotInfo[0],tSid=slotInfo[1];

      var items=slotEl.querySelectorAll('[data-ci]');
      var hIdx=items.length;
      for(var i=0;i<items.length;i++){
        var el2=items[i];
        if(tDay===day&&tSid===sid&&+el2.dataset.ci===idx)continue;
        var r2=el2.getBoundingClientRect(),mid=r2.top+r2.height/2;
        if(cy<mid){ hIdx=+el2.dataset.ci; break; }
      }
      setDragState(function(p){return p.dragging?{...p,hovSlot:tSid,hovDay:tDay,hovIdx:hIdx}:p;});
    }

    function up(){
      document.removeEventListener('pointermove',move);
      document.removeEventListener('pointerup',up);
      document.removeEventListener('pointercancel',up);
      clearDayNavTimer();

      if(started){
        document.body.style.overflow='';
        document.body.style.touchAction='';
        setDragState(function(finalState){
          if(finalState.dragging&&finalState.hovSlot!==null&&finalState.hovDay!==null){
            var tDay=finalState.hovDay,tSid=finalState.hovSlot,hIdx=finalState.hovIdx;
            if(tDay!==day||tSid!==sid){
              onMoveToSlot(day,sid,idx,tDay,tSid,hIdx===null?999:hIdx);
            }else{
              var fi=idx;
              if(hIdx!==null&&hIdx!==fi&&hIdx!==fi+1){
                var ti=hIdx>fi?hIdx-1:hIdx;
                onReorder(day,sid,fi,ti);
              }
            }
          }
          return {dragging:false,card:null,srcDay:null,srcSlot:null,srcIdx:null,hovSlot:null,hovDay:null,hovIdx:null,ghost:null};
        });
      }
    }

    document.addEventListener('pointermove',move);
    document.addEventListener('pointerup',up);
    document.addEventListener('pointercancel',up);
  }

  return <div data-slot={day+'|'+sid} style={{marginBottom:12}}
    onDragOver={function(e){e.preventDefault();if(!dragState.dragging)onExtOver(sid);}}
    onDragLeave={function(e){if(!e.currentTarget.contains(e.relatedTarget)){onExtLeave();}}}
    onDrop={function(e){e.preventDefault();if(!dragState.dragging)onExtDrop(e,{day,slot:sid});}}>
    <div style={{background:C.white,borderRadius:22,overflow:'hidden',border:'1.5px '+((isOver||slotHovered)?'solid':'dashed')+' '+((isOver||slotHovered)?C.sageD:C.line),transition:'border-color .15s',boxShadow:(isOver||slotHovered)?'0 6px 20px rgba(78,115,82,.15)':'0 1px 4px rgba(20,20,20,.03)'}}>
      <div style={{padding:'13px 16px',display:'flex',alignItems:'center',gap:11,background:(isOver||slotHovered)?C.sageL:'transparent',borderBottom:cards.length?'1px solid '+C.line:'none'}}>
        <div className="serif" style={{fontSize:22,lineHeight:1,color:(isOver||slotHovered)?C.sageD:C.sub,width:24,textAlign:'center'}}>{m.sym}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:14,letterSpacing:-.2}}>{m.label}</div>
          <div style={{fontSize:10,color:C.sub,marginTop:1,letterSpacing:.3}}>{m.time}</div>
        </div>
        {cards.length>0&&<div style={{display:'flex',alignItems:'center',gap:6}}>

          {cards.map(function(card,idx){
            var cc=CATS[card.cat];
            var isSrc=dragState.dragging&&dragState.srcDay===day&&dragState.srcSlot===sid&&dragState.srcIdx===idx;
            var showLine=slotHovered&&hovIdx===idx&&!isSrc;
            return <div key={card.id}>
              {showLine&&<div style={{height:3,background:C.sageD,borderRadius:2,margin:'4px 6px',boxShadow:'0 0 8px rgba(78,115,82,.4)'}}/>}
              <div data-ci={idx} className="drag-card" style={{visibility:isSrc?'hidden':'visible'}}>
                <SlotCardVisual card={card} cc={cc} idx={idx} cardsLen={cards.length} isGhost={false}
                  onGripDown={function(e){var cardEl=e.currentTarget.parentElement;pointerDown(e,idx,card,cardEl);}}
                  onBodyClick={function(){onTap(card);}}
                  onPrevClick={function(e){e.stopPropagation();if(idx>0)onReorder(day,sid,idx,idx-1);}}
                  onNextClick={function(e){e.stopPropagation();if(idx<cards.length-1)onReorder(day,sid,idx,idx+1);}}
                  onRmClick={function(e){e.stopPropagation();onRm(day,sid,card.id);}}/>
              </div>
            </div>;
          })}
          {slotHovered&&hovIdx===cards.length&&!(dragState.srcDay===day&&dragState.srcSlot===sid&&dragState.srcIdx===cards.length-1)&&<div style={{height:3,background:C.sageD,borderRadius:2,margin:'4px 6px',boxShadow:'0 0 8px rgba(78,115,82,.4)'}}/>}
        </div>}
      </div>
    </div>
  </div>;
}

function Home({trips,enter,create,importTrip,onDelete}){
  var [showImp,setShowImp]=useState(false);
  var [impCode,setImpCode]=useState('');
  var [impErr,setImpErr]=useState('');
  var [delTarget,setDelTarget]=useState(null); // trip pending deletion
  var lpTimer=useRef(null);
  var lpStart=useRef(null);
  function tryImport(){var d=dec(impCode);if(!d){setImpErr('行程码无效');return;}importTrip(d);setShowImp(false);setImpCode('');setImpErr('');}

  // Sort ascending by createdAt (earliest first), fallback on id
  var sortedTrips=trips.slice().sort(function(a,b){
    var ta=a.createdAt||parseInt((a.id||'').replace(/[^0-9]/g,''),10)||0;
    var tb=b.createdAt||parseInt((b.id||'').replace(/[^0-9]/g,''),10)||0;
    return ta-tb;
  });

  function startLongPress(e,trip){
    if(lpTimer.current)clearTimeout(lpTimer.current);
    // Record initial position
    lpStart.current={x:e.clientX,y:e.clientY};
    lpTimer.current=setTimeout(function(){
      lpTimer.current='fired';
      if(navigator.vibrate)try{navigator.vibrate(40);}catch(_){}
      setDelTarget(trip);
    },650);
  }
  function onPointerMoveLP(e){
    // If user moved more than 8px, cancel long press (they're scrolling)
    if(lpTimer.current&&lpTimer.current!=='fired'&&lpStart.current){
      var dx=Math.abs(e.clientX-lpStart.current.x);
      var dy=Math.abs(e.clientY-lpStart.current.y);
      if(dx>8||dy>8){
        clearTimeout(lpTimer.current);
        lpTimer.current=null;
      }
    }
  }
  function cancelLongPress(){
    if(lpTimer.current&&lpTimer.current!=='fired')clearTimeout(lpTimer.current);
    lpTimer.current=null;
  }

  return <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column'}}>
    {showImp&&<Modal onClose={function(){setShowImp(false);}}>
      <MH title="导入行程" onClose={function(){setShowImp(false);}}/>

function Planner({bundle,back,onUpdate}){
  var iTrip=bundle.trip;
  var [trip,setTrip]=useState(iTrip);
  function mkDays(n){var a=[];for(var i=1;i<=n;i++)a.push('Day '+i);return a;}
  var initP={};mkDays(iTrip.days).forEach(function(d){initP[d]=(bundle.plans&&bundle.plans[d])?bundle.plans[d]:{morning:[],afternoon:[],evening:[]};});
  var [cards,setCards]=useState(bundle.cards||[]);
  var [plans,setPlans]=useState(initP);
  var [day,setDay]=useState('Day 1');
  var [filt,setFilt]=useState('all');
  var [extId,setExtId]=useState(null);
  var [dragOver,setDragOver]=useState(null);
  var [modal,setModal]=useState(null);
  var [addOpen,setAddOpen]=useState(false);
  var [ptab,setPtab]=useState('backpack');
  var [shareOpen,setShareOpen]=useState(false);
  var [dayEdit,setDayEdit]=useState(false);
  var [newDays,setNewDays]=useState(iTrip.days);
  var [addName,setAddName]=useState('');
  var [addCat,setAddCat]=useState('food');
  var [addNote,setAddNote]=useState('');
  var [addHours,setAddHours]=useState('');
  var [addImgs,setAddImgs]=useState([]);
  var [addDur,setAddDur]=useState('');
  var [dupAck,setDupAck]=useState(null);
  var [searchQ,setSearchQ]=useState('');
  var [clearDayTarget,setClearDayTarget]=useState(null);
  var dayLpTimer=useRef(null);
  var dayLpStart=useRef(null);
  var [tripCode,setTripCode]=useState(null);
  var [copied,setCopied]=useState(false);
  var [selectMode,setSelectMode]=useState(false);
  var [selected,setSelected]=useState([]);
  var [batchDelOpen,setBatchDelOpen]=useState(false);
  var [toast,setToast]=useState(null);
  var [dragState,setDragState]=useState({dragging:false,card:null,srcDay:null,srcSlot:null,srcIdx:null,hovSlot:null,hovDay:null,hovIdx:null,ghost:null});
  var [bpGhost,setBpGhost]=useState(null);

  useEffect(function(){if(onUpdate)onUpdate(trip,cards,plans);},[trip,cards,plans]);
  // Firebase sync: track last local save to avoid echo-loop
  var lastLocalUpdate=useRef(0);
  useEffect(function(){if(!hasFB)return;var unsub=fbSub(trip.id,function(r){
    // Ignore remote updates that are our own echo (within 1 second)
    if(r.updatedAt&&r.updatedAt<=lastLocalUpdate.current+500)return;
    // Apply remote changes
    if(r.cards&&JSON.stringify(r.cards)!==JSON.stringify(cards))setCards(r.cards);
    if(r.plans&&JSON.stringify(r.plans)!==JSON.stringify(plans))setPlans(r.plans);
    if(r.trip&&JSON.stringify(r.trip)!==JSON.stringify(trip))setTrip(r.trip);
  });return unsub;},[trip.id]);
  useEffect(function(){
    if(hasFB){
      var ts=Date.now();
      lastLocalUpdate.current=ts;
      fbSave(trip.id,{trip:trip,cards:cards,plans:plans,updatedAt:ts});
    }
  },[trip,cards,plans]);

  var daysArr=mkDays(trip.days);
  var curPlan=plans[day]||{morning:[],afternoon:[],evening:[]};
  // "usedToday": shown in plan tab backpack strip — used today specifically (dims unused-elsewhere cards while planning today)
  // "usedAnywhere": shown in backpack tab — card used in ANY day's plan (main indicator of "already scheduled")
  var usedToday=[];['morning','afternoon','evening'].forEach(function(s){(curPlan[s]||[]).forEach(function(c){usedToday.push(c.id);});});
  var usedAnywhere={};
  Object.keys(plans).forEach(function(d){
    ['morning','afternoon','evening'].forEach(function(s){
      (plans[d]&&plans[d][s]||[]).forEach(function(c){
        if(!usedAnywhere[c.id])usedAnywhere[c.id]=[];
        usedAnywhere[c.id].push(d);
      });
    });
  });
  var filtered=filt==='all'?cards:cards.filter(function(c){return c.cat===filt;});
  if(searchQ.trim()){
    var q=searchQ.trim().toLowerCase();
    filtered=filtered.filter(function(c){return (c.name||'').toLowerCase().indexOf(q)!==-1||(c.note||'').toLowerCase().indexOf(q)!==-1;});
  }

  function showToast(m){setToast(m);}
  function adjDays(nd){var nda=mkDays(nd);setPlans(function(p){var n={};nda.forEach(function(d){n[d]=p[d]||{morning:[],afternoon:[],evening:[]};});return n;});setTrip(function(t){return {...t,days:nd};});if(mkDays(nd).indexOf(day)===-1)setDay('Day '+nd);setDayEdit(false);}
  function clearDay(d){
    setPlans(function(p){var n=JSON.parse(JSON.stringify(p));n[d]={morning:[],afternoon:[],evening:[]};return n;});

  }
  function dayLongPressStart(e,d){
    if(dayLpTimer.current)clearTimeout(dayLpTimer.current);
    dayLpStart.current={x:e.clientX,y:e.clientY};
    dayLpTimer.current=setTimeout(function(){
      dayLpTimer.current='fired';
      if(navigator.vibrate)try{navigator.vibrate(40);}catch(_){}
      setClearDayTarget(d);
    },600);
  }
  function dayLongPressMove(e){
    if(dayLpTimer.current&&dayLpTimer.current!=='fired'&&dayLpStart.current){
      var dx=Math.abs(e.clientX-dayLpStart.current.x),dy=Math.abs(e.clientY-dayLpStart.current.y);
      if(dx>8||dy>8){clearTimeout(dayLpTimer.current);dayLpTimer.current=null;}
    }
  }
  function dayLongPressCancel(){
    if(dayLpTimer.current&&dayLpTimer.current!=='fired')clearTimeout(dayLpTimer.current);
    dayLpTimer.current=null;
  }
  function extDrop(e,t){if(!extId)return;var card=null;for(var i=0;i<cards.length;i++)if(cards[i].id===extId){card=cards[i];break;}if(!card)return;setPlans(function(p){var n=JSON.parse(JSON.stringify(p));if(!n[t.day])n[t.day]={morning:[],afternoon:[],evening:[]};if(!n[t.day][t.slot])n[t.day][t.slot]=[];var found=false;n[t.day][t.slot].forEach(function(c){if(c.id===extId)found=true;});if(!found)n[t.day][t.slot]=[...n[t.day][t.slot],card];return n;});setExtId(null);setDragOver(null);}
  function reorder(d,s,fi,ti){setPlans(function(p){var n=JSON.parse(JSON.stringify(p));var a=n[d][s].slice();var m=a.splice(fi,1)[0];a.splice(ti,0,m);n[d][s]=a;return n;});}
  function rm(d,s,id){setPlans(function(p){var n=JSON.parse(JSON.stringify(p));n[d][s]=n[d][s].filter(function(c){return c.id!==id;});return n;});}
  function saveCard(u){setCards(function(p){return p.map(function(c){return c.id===u.id?u:c;});});setPlans(function(p){var n=JSON.parse(JSON.stringify(p));Object.keys(n).forEach(function(d){Object.keys(n[d]).forEach(function(s){n[d][s]=n[d][s].map(function(c){return c.id===u.id?u:c;});});});return n;});}
  function delCard(id){setCards(function(p){return p.filter(function(c){return c.id!==id;});});setPlans(function(p){var n=JSON.parse(JSON.stringify(p));Object.keys(n).forEach(function(d){Object.keys(n[d]).forEach(function(s){n[d][s]=n[d][s].filter(function(c){return c.id!==id;});});});return n;});}
  function addCard(force){
    var n=addName.trim();if(!n)return;
    // Duplicate name detection — case-insensitive, trim-tolerant
    var nameLower=n.toLowerCase();
    var existing=cards.find(function(c){return (c.name||'').trim().toLowerCase()===nameLower;});
    if(existing&&!force){
      setDupAck(existing);
      return;
    }
    setCards(function(p){return [...p,{id:'c'+Date.now(),name:n,cat:addCat,note:addNote,hours:addHours,duration:addDur,imgs:addImgs.map(function(x){return x.src||x;})}];});
    setAddName('');setAddCat('food');setAddNote('');setAddHours('');setAddDur('');setAddImgs([]);setDupAck(null);
    setAddOpen(false);showToast('已加入背包');
  }
  function openExistingCard(){
    if(!dupAck)return;
    var e=dupAck;
    setAddOpen(false);setDupAck(null);
    setAddName('');setAddCat('food');setAddNote('');setAddHours('');setAddDur('');setAddImgs([]);
    setModal(e);
  }
  function genCode(){var code=enc(trip,plans,cards);if(code){setTripCode(code);setCopied(false);}else showToast('生成失败');}
  // Robust copy function that works in WeChat browser, non-HTTPS, and all edge cases
  function doCopyText(text,successMsg){
    if(!text)return;
    var fallback=function(){
      try{
        var ta=document.createElement('textarea');
        ta.value=text;
        // Critical: textarea must be visible & focusable on iOS/Safari
        ta.style.cssText='position:fixed;left:0;top:0;opacity:0;font-size:16px;';
        ta.setAttribute('readonly','');
        document.body.appendChild(ta);
        // iOS needs this special dance
        var range=document.createRange();
        range.selectNodeContents(ta);
        var sel=window.getSelection();

        sel.addRange(range);
        ta.setSelectionRange(0,text.length);
        ta.focus();
        ta.select();
        var ok=document.execCommand('copy');
        document.body.removeChild(ta);
        return ok;
      }catch(e){return false;}
    };
    // Try modern API first (only works on HTTPS or localhost)

        showToast(successMsg||'已复制到剪贴板');
      }).catch(function(){
        // Promise rejected — fall back
        if(fallback())showToast(successMsg||'已复制到剪贴板');
        else showToast('复制失败，请手动长按选择');
      });
    }else{
      // Non-secure context or no clipboard API — use execCommand
      if(fallback())showToast(successMsg||'已复制到剪贴板');
      else showToast('复制失败，请手动长按选择');
    }
  }
  function copyCode(){

  function toggleSel(id){setSelected(function(p){return p.indexOf(id)!==-1?p.filter(function(i){return i!==id;}):[...p,id];});}
  function batchAddTo(sid){setPlans(function(p){var n=JSON.parse(JSON.stringify(p));selected.forEach(function(cid){var card=cards.find(function(c){return c.id===cid;});if(!card)return;if(!(n[day][sid]||[]).find(function(c){return c.id===cid;}))n[day][sid]=[...(n[day][sid]||[]),card];});return n;});showToast('已加入 '+selected.length+' 项到 '+SLOTS[sid].label);setSelectMode(false);setSelected([]);}

    setSelectMode(false);setSelected([]);setBatchDelOpen(false);

  // Cross-slot move: remove from source, insert at target
  function moveToSlot(srcD,srcS,srcI,tD,tS,tI){
    setPlans(function(p){
      var n=JSON.parse(JSON.stringify(p));
      if(!n[srcD]||!n[srcD][srcS])return p;
      var card=n[srcD][srcS][srcI];
      if(!card)return p;
      // Ensure target day/slot exists (defensive against bad data)
      if(!n[tD])n[tD]={morning:[],afternoon:[],evening:[]};
      if(!n[tD][tS])n[tD][tS]=[];
      // Check if target slot already has this card
      var exists=n[tD][tS].find(function(c){return c.id===card.id;});
      n[srcD][srcS]=n[srcD][srcS].filter(function(_,i){return i!==srcI;});
      if(!exists){
        var arr=n[tD][tS];
        var insertAt=Math.min(tI,arr.length);
        arr.splice(insertAt,0,card);
        n[tD][tS]=arr;
      }
      return n;
    });
  }

  // Backpack → slot drag via pointer events

  function backpackPointerDown(e,card,cardEl,isPill){

    var rect=cardEl.getBoundingClientRect();

        setBpGhost({card:card,x:cx-offsetX,y:cy-offsetY,w:rect.width,wide:!isPill});
      }else{
        setBpGhost(function(p){return p?{...p,x:cx-offsetX,y:cy-offsetY}:p;});
      }
      var vh=window.innerHeight;
      if(cy<80)window.scrollBy(0,-8);
      else if(cy>vh-80)window.scrollBy(0,8);
      var target=document.elementFromPoint(cx,cy);
      var dayBtn=target&&target.closest&&target.closest('[data-daynav]');
      if(dayBtn){
        var targetDay=dayBtn.dataset.daynav;
        if(targetDay!==day&&dayBtn!==dayNavHoverEl){
          clearDayNavTimer();
          dayNavHoverEl=dayBtn;
          dayBtn.style.boxShadow='0 0 0 2px '+C.sageD+',0 4px 16px rgba(78,115,82,.3)';
          dayBtn.style.transform='scale(1.08)';
          dayBtn.style.transition='all .2s';
          dayNavTimer=setTimeout(function(){
            setDay(targetDay);
            if(navigator.vibrate)try{navigator.vibrate(30);}catch(_){}
            clearDayNavTimer();
          },500);
        }
        setDragOver(null);
        return;
      }else{
        if(dayNavHoverEl)clearDayNavTimer();
      }
      var slotEl=target&&target.closest&&target.closest('[data-slot]');
      if(slotEl){
        var si=slotEl.dataset.slot.split('|');
        setDragOver(si[1]);
      }else{
        setDragOver(null);
      }
    }
    function up(ev){
      document.removeEventListener('pointermove',move);
      document.removeEventListener('pointerup',up);
      document.removeEventListener('pointercancel',up);
      document.body.style.overflow='';
      document.body.style.touchAction='';
      clearDayNavTimer();
      if(cardEl)cardEl.style.visibility='';

            return n;
          });
          showToast('已加入 '+SLOTS[tSid].label);
        }
      }
      setDragOver(null);
    }
    document.addEventListener('pointermove',move);
    document.addEventListener('pointerup',up);
    document.addEventListener('pointercancel',up);

              // Background: unused = color, inToday = white wash, inOtherDay = very soft wash
              var bg=inToday?'rgba(255,255,255,.35)':(inOtherDay?'rgba(255,255,255,.55)':cc.bg);
              return <div key={card.id} className="drag-card drag-handle" onPointerDown={function(e){backpackPointerDown(e,card,e.currentTarget,true);}} onContextMenu={function(e){e.preventDefault();}} style={{background:bg,borderRadius:11,padding:'7px 12px',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:5,fontSize:12,flexShrink:0,opacity:op,border:'1px solid '+(inToday||inOtherDay?C.line:'transparent'),fontWeight:500}}><Ic n={card.cat} s={12} c={inToday||inOtherDay?C.sub:cc.fg}/>{card.name}</div>;
            })}
          </div>}
        </div>
      </div>}
    </div>

    {clearDayTarget&&<Modal onClose={function(){setClearDayTarget(null);}}>
      <MH title={"清空 "+clearDayTarget+" ？"} onClose={function(){setClearDayTarget(null);}}/>
      <div style={{background:'rgba(192,64,64,.08)',border:'1px solid rgba(192,64,64,.2)',borderRadius:14,padding:'14px 16px',marginBottom:14}}>
        <div className="serif" style={{fontSize:17,fontWeight:500,color:C.ink,marginBottom:4}}>{clearDayTarget} 所有时段</div>
        <div style={{fontSize:12,color:C.sub,lineHeight:1.6}}>共 {(function(){var c=0;if(plans[clearDayTarget]){['morning','afternoon','evening'].forEach(function(s){c+=(plans[clearDayTarget][s]||[]).length;});}return c;})()} 张卡片将被移除</div>
      </div>
      <div style={{fontSize:12,color:C.sub,marginBottom:16,lineHeight:1.65}}>本日的卡片将从时段中移除，但依然保留在背包中，不会被删除。</div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={function(){setClearDayTarget(null);}} style={{flex:1,padding:'13px 0',borderRadius:12,border:'none',background:C.bg,cursor:'pointer',fontSize:13,color:C.sub}}>取消</button>
        <button onClick={function(){clearDay(clearDayTarget);}} style={{flex:2,padding:'13px 0',borderRadius:12,border:'none',background:'#C04040',color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600}}>清空本日</button>
      </div>
    </Modal>}

    {batchDelOpen&&<Modal onClose={function(){setBatchDelOpen(false);}}>
      <MH title="删除卡片？" onClose={function(){setBatchDelOpen(false);}}/>
      <div style={{background:'rgba(192,64,64,.08)',border:'1px solid rgba(192,64,64,.2)',borderRadius:14,padding:'14px 16px',marginBottom:14}}>
        <div className="serif" style={{fontSize:17,fontWeight:500,color:C.ink,marginBottom:4}}>共 {selected.length} 张卡片</div>
        <div style={{fontSize:12,color:C.sub,lineHeight:1.6}}>包括所有时段中已使用的同名卡片</div>
      </div>
      <div style={{fontSize:12,color:C.sub,marginBottom:16,lineHeight:1.65}}>此操作不可撤销，卡片将从背包和所有时段安排中永久删除。</div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={function(){setBatchDelOpen(false);}} style={{flex:1,padding:'13px 0',borderRadius:12,border:'none',background:C.bg,cursor:'pointer',fontSize:13,color:C.sub}}>取消</button>
        <button onClick={batchDelete} style={{flex:2,padding:'13px 0',borderRadius:12,border:'none',background:'#C04040',color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600}}>删除 {selected.length} 张</button>
      </div>
    </Modal>}

    {selectMode&&selected.length>0&&<div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:70,background:'rgba(252,250,245,.96)',backdropFilter:'blur(20px)',borderTop:'1px solid '+C.line,padding:'14px 16px 22px',boxShadow:'0 -8px 24px rgba(0,0,0,.06)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:600}}>已选 <span className="serif" style={{color:C.sageD,fontSize:16}}>{selected.length}</span> 项</div>
        <button onClick={function(){setSelectMode(false);setSelected([]);}} style={{background:'none',border:'none',color:C.sub,fontSize:12,cursor:'pointer'}}>取消</button>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:10,overflowX:'auto'}}>
        {daysArr.map(function(d){return <button key={d} onClick={function(){setDay(d);}} style={{padding:'7px 13px',borderRadius:99,background:day===d?C.ink:C.white,color:day===d?'#fff':C.sub,cursor:'pointer',fontSize:12,fontWeight:day===d?600:400,flexShrink:0,border:'1px solid '+C.line}}>{d}</button>;})}
      </div>
      <div style={{display:'flex',gap:6,marginBottom:8}}>
        {['morning','afternoon','evening'].map(function(s){return <button key={s} onClick={function(){batchAddTo(s);}} style={{flex:1,padding:'12px 0',borderRadius:13,border:'none',background:C.sageD,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600}}>→ {SLOTS[s].label}</button>;})}
      </div>
      <button onClick={function(){setBatchDelOpen(true);}} style={{width:'100%',padding:'11px 0',borderRadius:13,border:'1.5px solid rgba(192,64,64,.25)',background:'rgba(192,64,64,.06)',color:'#B03838',cursor:'pointer',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
        <Ic n="trash" s={14} c="#B03838"/>批量删除
      </button>
    </div>}

    {!selectMode&&<button onClick={function(){setAddOpen(true);}} style={{position:'fixed',bottom:28,right:20,zIndex:60,background:C.ink,color:'#fff',border:'none',borderRadius:18,width:56,height:56,cursor:'pointer',boxShadow:'0 8px 22px rgba(20,20,20,.22)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <Ic n="plus" s={22} c="#fff"/>
    </button>}
  </div>;
}

function CreateModal({onAdd,onClose}){
  var [name,setName]=useState('');
  var [date,setDate]=useState('');
  var [days,setDays]=useState(3);
  var [submitting,setSubmitting]=useState(false);
  var COLORS=['#8BB08E','#8899CC','#CC9988','#AA88CC','#C4B868','#88B8CC','#CC8888'];
  var [color,setColor]=useState('#8BB08E');
  function doCreate(){
    if(submitting)return;
    var n=name.trim();if(!n)return;
    setSubmitting(true);
    try{
      var t={id:'t'+Date.now()+'_'+Math.random().toString(36).slice(2,7),name:n,date:date,days:days,color:color,members:1,createdAt:Date.now()};
      onAdd(t);
    }catch(e){
      console.error('createTrip failed',e);
      setSubmitting(false);
      alert('创建失败，请重试：'+(e.message||''));
    }
  }
  return <Modal onClose={onClose}>
    <MH title="创建行程" onClose={onClose}/>
    <FL t="行程名称"/><TF v={name} set={setName} ph="例：杭州三日游"/>
    <FL t="日期（选填）"/><TF v={date} set={setDate} ph="例：5月1-3日" mb={15}/>
    <FL t="天数"/><DaySlider v={days} set={setDays}/>
    <div style={{height:15}}/>
    <FL t="标签色"/>
    <div style={{display:'flex',gap:8,marginBottom:4}}>
      {COLORS.map(function(col){return <button key={col} onClick={function(){setColor(col);}} style={{width:30,height:30,borderRadius:'50%',background:col,border:color===col?'3px solid '+C.ink:'2.5px solid transparent',cursor:'pointer',transform:color===col?'scale(1.1)':'scale(1)'}}/>;})}
    </div>
    <div style={{display:'flex',gap:8,marginTop:20}}>
      <button onClick={onClose} style={{flex:1,padding:'13px 0',borderRadius:12,border:'none',background:C.bg,cursor:'pointer',fontSize:13,color:C.sub}}>取消</button>
      <button onClick={doCreate} disabled={!name.trim()||submitting} style={{flex:2,padding:'13px 0',borderRadius:12,border:'none',background:(name.trim()&&!submitting)?C.ink:'#ccc',color:'#fff',cursor:(name.trim()&&!submitting)?'pointer':'default',fontSize:13,fontWeight:600,letterSpacing:.5}}>{submitting?'创建中...':'创建'}</button>
    </div>
  </Modal>;
}

function App(){
  var saved=ldLS();
  var [sc,setSc]=useState('login');
  var [trips,setTrips]=useState(saved?(saved.trips||[]):[]);
  var [tripData,setTripData]=useState(saved?(saved.tripData||{}):{});
  var [cur,setCur]=useState(null);
  var [createOpen,setCreateOpen]=useState(false);

  useEffect(function(){svLS({trips:trips,tripData:tripData});},[trips,tripData]);

  useEffect(function(){
    if(!hasFB)return;
    var params=new URLSearchParams(window.location.search);
    var tid=params.get('trip');
    if(tid){
      fbGet(tid).then(function(data){
        if(data){
          setTrips(function(p){var e=p.find(function(t){return t.id===data.trip.id;});return e?p:[data.trip,...p];});
          setCur({trip:data.trip,cards:data.cards||[],plans:data.plans||null});
          setSc('planner');
        }
      });
    }
  },[]);

  function openPlanner(t,iCards,iPlans){
    try{
      // Ensure all required fields exist
      if(!t||!t.id||!t.name){console.error('invalid trip',t);return;}
      if(!t.createdAt)t=Object.assign({},t,{createdAt:Date.now()});
      if(!t.days||t.days<1)t=Object.assign({},t,{days:1});
      // Immediately persist to LS before state transitions — guarantees no loss
      try{
        var current=ldLS()||{trips:[],tripData:{}};
        if(!current.trips.find(function(x){return x.id===t.id;})){
          current.trips.push(t);
          svLS(current);
        }
      }catch(_){}
      // Update React state
      setTrips(function(p){var e=p.find(function(x){return x.id===t.id;});return e?p:[...p,t];});
      var stored=tripData[t.id];
      setCur({trip:t,cards:(iCards&&iCards.length)?iCards:(stored?stored.cards:[]),plans:iPlans||(stored?stored.plans:null)});
      setCreateOpen(false);
      setSc('planner');
    }catch(e){
      console.error('openPlanner failed',e);
      alert('创建失败：'+(e.message||'未知错误'));
    }
  }
  function importTrip(data){var t=Object.assign({},data.trip,{id:'t'+Date.now(),createdAt:Date.now()});openPlanner(t,data.cards||[],data.plans||null);}
  function updateTripData(trip,cards,plans){setTripData(function(p){return {...p,[trip.id]:{cards:cards,plans:plans}};});setTrips(function(p){return p.map(function(t){return t.id===trip.id?trip:t;});});}
  function deleteTrip(tid){
    setTrips(function(p){return p.filter(function(t){return t.id!==tid;});});
    setTripData(function(p){var n=Object.assign({},p);delete n[tid];return n;});
    // Also remove from Firebase if enabled
    if(hasFB)try{window._db.ref('trips/'+tid).remove();}catch(_){}
  }

  if(sc==='login')return <Login go={function(){setSc('home');}}/>;
  if(sc==='planner'&&cur)return <Planner bundle={cur} back={function(){setSc('home');}} onUpdate={updateTripData}/>;
  return <div>
    {createOpen&&<CreateModal onAdd={function(t){openPlanner(t,[],null);}} onClose={function(){setCreateOpen(false);}}/>}
    <Home trips={trips} enter={function(t){openPlanner(t,[],null);}} create={function(){setCreateOpen(true);}} importTrip={importTrip} onDelete={deleteTrip}/>
  </div>;
}

// Global defense against Android text-selection menu triggering on long-press of drag cards
if(typeof window!=='undefined'&&typeof document!=='undefined'){
  document.addEventListener('selectstart',function(e){
    var t=e.target;
    if(t&&t.closest&&t.closest('.drag-card'))e.preventDefault();
  },{capture:true});
  document.addEventListener('contextmenu',function(e){
    var t=e.target;
    if(t&&t.closest&&t.closest('.drag-card'))e.preventDefault();
  },{capture:true});
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
